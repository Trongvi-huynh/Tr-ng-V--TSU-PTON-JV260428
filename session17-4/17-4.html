<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .flex {
        display: flex;
        gap: 20px;      
      }
      .item {
         width: 100px;
        height: 100px;
        border: 2px solid black;
         }
      .item:nth-child(1) {
        background-color: yellow;
      }
      .item:nth-child(2) {
        background-color: blue;
      }
      .item:nth-child(3) {
        background-color: red;
      }
    </style>
  </head>
  <body>
   <h1>Change item background color</h1>
   <p>Mouse over the square to change its background color</p>
   <div class="flex">
        <div class="item" id="yellow">Yellow</div>
        <div class="item" id="blue">Blue</div>
        <div class="item" id="red">Red</div>
   </div>

    <script src="./session17-4.js"></script>
  </body>
</html>
